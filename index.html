<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>To Do List Online</title>
    <link rel="stylesheet" href="styless.css">
</head>

<body>

<header>
    <nav>
        <a href="#">About</a>
        <a href="#">En / 中</a>
    </nav>
</header>

<main>


<section class="entrada-tarea">

    <img src="https://todo.uiineed.com/public/img/todo.svg"
         alt="Icono Lista"
         width="200"
         height="50">

    <div class="caja-input">
        <input id="inputTarea"
               type="text"
               placeholder="Agregar una tarea...">
        <button id="btnAgregar">Agregar</button>
    </div>

</section>

<section class="contenido-tareas">


    <article class="card">  
         <div class="header-card">
             <button id="btnMarcarTodas">Marcar todas ✔</button>
                <h3>Actúa ahora, simplifica tu vida.</h3>       
        </div>
        <hr>

        <div id="estado" class="estado"></div>
        
        <ul id="listaTareas" class="lista-tareas"></ul>

        <div class="pie-tareas">
            <p id="contadorPendientes">0 tareas pendientes</p>
        </div>

    </article>

    <aside class="sidebar">

        <h3>OPEN ✨</h3>

        <button class="btn-filtro active" data-filtro="todas">
            Todas
        </button>

        <button class="btn-filtro" data-filtro="pendientes">
            Pendientes
        </button>

        <button class="btn-filtro" data-filtro="completadas">
            Completadas
        </button>

        <hr>

    </aside>

</section>

</main>

<script src="app.js"></script>
</body>
</html>
