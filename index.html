<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>To Do List Online</title>
    <link rel="stylesheet" href="styless.css">
</head>

<body>

<header>
    <nav>
        <a href="#">About</a>
        <a href="#">En / 中</a>
    </nav>
</header>

<main>
<section class="todo-input">
        <img src="https://todo.uiineed.com/public/img/todo.svg" alt="Todo List Icon" width="200px" height="50px">
        <div class="input-box">
            <input type="text" placeholder="Add a to-do item...">
            <button>Add</button>
        </div>
    </section>

    <section class="todo-content">

        <article class="card">
            <h3>Act Now, Simplify Life.</h3>
            <hr>

            <p><strong>Add Your First To-Do Item!</strong></p>

            <p>Usage Tips:</p>
            <ul>
                <li>Press Enter to submit.</li>
                <li>Drag to reorder tasks.</li>
                <li>Double-click to edit.</li>
                <li>Data is stored locally.</li>
                <li>Supports download/import.</li>
            </ul>

            <div class="card-footer"></div>
        </article>


        <aside class="sidebar">
            <h3>OPEN ✨</h3>
            <button>All</button>
            <button>Import(txt/json)</button>
        </aside>

    </section>

</main>
</body>
</html>
